name: Android CI

on:
  push:
    branches:
      - main
      - master
      - test-cicd
  pull_request:
    branches:
      - main
      - master
      - test-cicd

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew --no-daemon :app:assembleDebug
