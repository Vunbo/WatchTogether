name: Android Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          source app/version.properties
          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          if [ -n "${VERSION_SUFFIX:-}" ]; then
            VERSION_NAME="${VERSION_NAME}-${VERSION_SUFFIX}"
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          EXPECTED_TAG="v${VERSION_NAME}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must match app/version.properties version ${EXPECTED_TAG}"
            exit 1
          fi
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "$ANDROID_KEYSTORE_BASE64" ] || { echo "::error::Missing secret ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || { echo "::error::Missing secret ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [ -n "$ANDROID_KEY_ALIAS" ] || { echo "::error::Missing secret ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "$ANDROID_KEY_PASSWORD" ] || { echo "::error::Missing secret ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Prepare signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release/watchtogether-release.jks
          {
            printf '%s\n' "storeFile=release/watchtogether-release.jks"
            printf '%s\n' "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            printf '%s\n' "keyAlias=${ANDROID_KEY_ALIAS}"
            printf '%s\n' "keyPassword=${ANDROID_KEY_PASSWORD}"
          } > release/keystore.properties

      - name: Build release APK
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Prepare release assets
        id: assets
        shell: bash
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          APK_SOURCE="app/build/outputs/apk/release/app-release.apk"
          APK_NAME="WatchTogether-${VERSION_NAME}.apk"
          if [ ! -f "$APK_SOURCE" ]; then
            echo "::error::Release APK not found at $APK_SOURCE"
            exit 1
          fi
          cp "$APK_SOURCE" "$APK_NAME"
          APK_SHA256="$(sha256sum "$APK_NAME" | awk '{print $1}')"
          APK_SIZE="$(stat -c%s "$APK_NAME")"
          APK_URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/${APK_NAME}"
          git log -1 --pretty=%s > release_notes.txt
          python .github/scripts/generate_update_json.py \
            --version-code "$VERSION_CODE" \
            --version-name "$VERSION_NAME" \
            --apk-url "$APK_URL" \
            --apk-sha256 "$APK_SHA256" \
            --apk-size "$APK_SIZE" \
            --notes-file release_notes.txt \
            --output update.json
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          APK_NAME: ${{ steps.assets.outputs.apk_name }}
        shell: bash
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${GITHUB_REF_NAME}" "$APK_NAME" update.json \
            --title "WatchTogether ${VERSION_NAME}" \
            --notes-file release_notes.txt \
            --target "${GITHUB_SHA}" \
            $PRERELEASE_FLAG
